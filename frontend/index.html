<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VaporTrace // Detonation Chamber</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav>
        <div class="logo">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"></path>
            </svg>
            VAPORTRACE
        </div>
        <div class="status-badge">
            <span></span> DETONATOR ONLINE
        </div>
    </nav>

    <main>
        <div class="panel controls-panel">
            <h2>Chamber Configuration</h2>
            <div class="input-group">
                <label for="target-url">Target URL</label>
                <input type="text" id="target-url" placeholder="https://malicious-site.com" value="https://example.com">
            </div>
            
            <div class="input-group">
                <label for="capture-limit">Instruction Limit</label>
                <input type="number" id="capture-limit" value="20000" step="5000">
            </div>

            <button class="btn" id="detonate-btn">INITIATE DETONATION</button>

            <div style="margin-top: auto; padding-top: 20px; border-top: 1px solid var(--border-color);">
                <h2>System Stats</h2>
                <div style="display: flex; flex-direction: column; gap: 10px; font-size: 0.8rem; color: var(--text-dim);">
                    <div style="display: flex; justify-content: space-between;">
                        <span>V8 Engine</span>
                        <span style="color: white;">v12.2.281</span>
                    </div>
                    <div style="display: flex; justify-content: space-between;">
                        <span>Uptime</span>
                        <span style="color: white;">99.9%</span>
                    </div>
                    <div style="display: flex; justify-content: space-between;">
                        <span>Nodes</span>
                        <span style="color: white;">4 Active</span>
                    </div>
                </div>
            </div>
        </div>

        <div class="panel stream-panel">
            <h2>Bytecode Firehose</h2>
            <div id="bytecode-stream">
                <div style="text-align: center; margin-top: 100px; color: var(--text-dim);">
                    Waiting for detonation sequence...
                </div>
            </div>
        </div>

        <div class="panel terminal-panel">
            <h2>Console Logs</h2>
            <div id="terminal-output">
                <div class="terminal-line">
                    <span class="timestamp">[14:02:11]</span>
                    <span class="info">System initialized. Ready for capture.</span>
                </div>
            </div>
        </div>
    </main>

    <script src="app.js"></script>
</body>
</html>
